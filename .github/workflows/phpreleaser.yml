---
name: phpreleaser

# Grant GITHUB_TOKEN the rights it needs
permissions:
  contents: write # gives access to create Releases via the REST API
  issues: write # optional, if you want to comment on PRs/issues
  pull-requests: write # optional, same
  packages: write # optional, if you publish packages

on:
  pull_request:
  push:
    tags:
      - "**"

jobs:
  phpreleaser:
    runs-on: ubuntu-latest
    env:
      PLUGIN_RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PHP syntax
        run: |
          find . -name '*.php' -print0 | xargs -0 -n1 php -l
          php tests/api-error-context.test.php
          php tests/release-workflow.test.php

      - name: Prepare release metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: php scripts/prepare-release.php "$PLUGIN_RELEASE_VERSION"

      - name: Print Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "Release version is $PLUGIN_RELEASE_VERSION"

      - name: Create Subfolder
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p woocommerce-payment-gateway-app
          find . -maxdepth 1 -type f \
            -exec mv {} woocommerce-payment-gateway-app/ \;
          find . -maxdepth 1 -type d ! -name woocommerce-payment-gateway-app ! -name . \
            -exec mv {} woocommerce-payment-gateway-app/ \;
          rm -rf woocommerce-payment-gateway-app/.git* woocommerce-payment-gateway-app/.github

      - name: Archive Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          filename: woocommerce-payment-gateway-app_v${{ env.PLUGIN_RELEASE_VERSION }}.zip
          exclusions: "woocommerce-payment-gateway-app/RELEASE.md woocommerce-payment-gateway-app/scripts/* woocommerce-payment-gateway-app/tests/* *.git* *.github*"

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: woocommerce-payment-gateway-app_v${{ env.PLUGIN_RELEASE_VERSION }}.zip
          bodyFile: woocommerce-payment-gateway-app/RELEASE.md
          token: ${{ secrets.GITHUB_TOKEN }}
