name: phpreleaser

on:
  pull_request:
  push:
    tags:
      - "*"

jobs:
  phpreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Print Release Version
        run: echo Release version is ${{ github.ref_name }}

      - name: Create Subfolder
        run: mkdir -p woocommerce-multi-payment-gateway && find . -maxdepth 1 -type f -exec mv {} woocommerce-multi-payment-gateway/ \; && find . -maxdepth 1 -type d ! -name woocommerce-multi-payment-gateway ! -name . -exec mv {} woocommerce-multi-payment-gateway/ \; && rm -rf woocommerce-multi-payment-gateway/.git* woocommerce-multi-payment-gateway/.github

      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          filename: woocommerce-multi-payment-gateway_v${{ github.ref_name }}.zip
          exclusions: "woocommerce-multi-payment-gateway/RELEASE.md *.git* *.github*"

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: woocommerce-multi-payment-gateway_v${{ github.ref_name }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
